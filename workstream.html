<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workstream — Jonathan Daniel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <script src="data.js"></script>
  <style>
    :root{--navy:#0f1f38;--teal:#1a7a6e;--teal-light:#22a898;--sand:#f5f0e8;--cream:#faf8f4;--muted:#6b7280;--border:#e2ddd5;--card:#fff;--radius:10px;--shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);--font-display:'DM Serif Display',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:#f0ede7;color:#1a1a2e;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
    nav{position:sticky;top:0;z-index:50;background:rgba(250,248,244,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px}
    .nav-left{display:flex;align-items:center;gap:1rem}
    .nav-brand{font-family:var(--font-display);font-size:1rem;color:var(--navy)}
    .nav-ws-num{font-family:var(--font-display);font-size:1.2rem;color:var(--border)}
    .back-link{font-size:.82rem;color:var(--muted);text-decoration:none}
    .back-link:hover{color:var(--teal)}
    .page{max-width:1100px;margin:0 auto;padding:2.5rem 2rem}
    .ws-header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow);margin-bottom:2rem}
    .ws-header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:2rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .ws-title{font-family:var(--font-display);font-size:1.8rem;color:var(--navy);letter-spacing:-.02em;line-height:1.15;margin-bottom:.3rem}
    .ws-subtitle{font-size:.95rem;color:var(--muted);font-style:italic}
    .status-badge{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:5px}
    .status-not-started{background:#f3f4f6;color:#9ca3af}
    .status-in-progress{background:#fef3c7;color:#92400e}
    .status-writing{background:#dbeafe;color:#1e40af}
    .status-submitted{background:#ede9fe;color:#5b21b6}
    .status-complete{background:#d1fae5;color:#065f46}
    .ws-description{font-size:.9rem;color:#4b5563;line-height:1.75;margin-bottom:1.25rem}
    .bar-track{height:6px;background:#e5e7eb;border-radius:99px;overflow:hidden}
    .bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),var(--teal-light));transition:width 1s cubic-bezier(.4,0,.2,1)}
    .bar-label{font-size:.75rem;font-weight:600;color:var(--teal);margin-top:.3rem}
    .milestone-row{display:flex;align-items:center;gap:.625rem;font-size:.875rem;color:#374151;padding:.35rem 0;border-bottom:1px solid #f3f4f6}
    .milestone-row:last-child{border-bottom:none}
    .milestone-row.done{color:var(--muted);text-decoration:line-through}
    .ms-dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
    .ms-dot.done{background:var(--teal);color:#fff}
    .ms-dot.pending{background:#e5e7eb}
    .kanban-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;margin-bottom:2rem}
    .kanban-col{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
    .kanban-col-header{padding:.875rem 1.1rem;font-size:.72rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .col-todo .kanban-col-header{background:#f9fafb;color:var(--muted)}
    .col-doing .kanban-col-header{background:#fffbeb;color:#92400e}
    .col-done .kanban-col-header{background:#f0fdf4;color:#166534}
    .col-count{font-family:var(--font-display);font-size:1.2rem}
    .kanban-cards{padding:.75rem}
    .kanban-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:.875rem 1rem;margin-bottom:.625rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .kanban-card:last-child{margin-bottom:0}
    .kc-text{font-size:.875rem;font-weight:500;color:#1a1a2e;line-height:1.4;margin-bottom:.3rem}
    .kc-due{font-size:.73rem;color:var(--muted)}
    .kc-note{font-size:.73rem;color:var(--teal);margin-top:.25rem;font-style:italic}
    .kanban-empty{font-size:.8rem;color:var(--muted);font-style:italic;padding:.5rem .25rem}

    /* METHOD LOG — clickable entries */
    .log-entry{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.625rem;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .2s,transform .2s,border-left-color .2s;text-decoration:none;display:block;color:inherit}
    .log-entry:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateX(3px);border-left-color:var(--teal-light)}
    .log-entry-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
    .log-date{font-size:.75rem;font-weight:600;color:var(--teal);margin-bottom:.2rem}
    .log-text{font-size:.87rem;color:#374151;line-height:1.65}
    .log-link-count{font-size:.72rem;font-weight:600;background:#eef4f3;color:var(--teal);padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
    .log-open-hint{font-size:.72rem;color:var(--muted);margin-top:.4rem}
    .log-empty{font-size:.85rem;color:var(--muted);font-style:italic;padding:.5rem 0}

    .section-block{margin-bottom:2rem}
    .section-label{font-size:.72rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:.875rem}
    .info-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow)}
    @media(max-width:700px){.kanban-wrap{grid-template-columns:1fr}.ws-header-top{flex-direction:column}}
  </style>
</head>
<body>
<nav>
  <div class="nav-left">
    <span class="nav-ws-num" id="nav-num"></span>
    <span class="nav-brand" id="nav-title"></span>
  </div>
  <a href="dashboard.html" class="back-link">← Dashboard</a>
</nav>
<div class="page" id="page"><div style="color:var(--muted);font-size:.9rem;padding:2rem 0">Loading…</div></div>
<script>
const D=SITE_DATA;
const params=new URLSearchParams(window.location.search);
const id=parseInt(params.get('id'));
const ws=D.workstreams.find(w=>w.id===id);
if(!ws){
  document.getElementById('page').innerHTML='<div style="color:#c00;padding:2rem">Workstream not found. <a href="dashboard.html">Back to dashboard</a></div>';
}else{
  document.title=`${ws.title} — Jonathan Daniel`;
  document.getElementById('nav-num').textContent=`0${ws.id}`;
  document.getElementById('nav-title').textContent=ws.title;
  function statusLabel(s){return s.replace(/-/g,' ')}
  const msHTML=ws.milestones.map(m=>`<div class="milestone-row ${m.done?'done':''}"><div class="ms-dot ${m.done?'done':'pending'}">${m.done?'✓':''}</div>${m.label}</div>`).join('');
  function col(s){return ws.tasks.filter(t=>t.status===s)}
  function cardHTML(t){return`<div class="kanban-card"><div class="kc-text">${t.text}</div>${t.due?`<div class="kc-due">📅 ${t.due}</div>`:''}${t.note?`<div class="kc-note">${t.note}</div>`:''}</div>`}
  function colCards(tasks){return tasks.length?tasks.map(cardHTML).join(''):'<div class="kanban-empty">Nothing here</div>'}
  const todo=col('todo'),doing=col('doing'),done=col('done');

  // Method log — clickable, links to logentry.html
  function logEntryHTML(e, wsId){
    const links=e.links||[];
    const linkBadge=links.length?`<span class="log-link-count">📎 ${links.length} link${links.length>1?'s':''}</span>`:'';
    const entryParam=encodeURIComponent(e.date+'__'+wsId);
    return`<a href="logentry.html?ws=${wsId}&date=${encodeURIComponent(e.date)}&idx=${e._idx}" class="log-entry">
      <div class="log-entry-top"><div><div class="log-date">${e.date}</div><div class="log-text">${e.entry}</div></div>${linkBadge}</div>
      <div class="log-open-hint">Click to view full entry, linked documents & protocols →</div>
    </a>`;
  }

  const logHTML=ws.methodLog.length===0
    ?'<div class="log-empty">No entries yet — add them in data.js</div>'
    :ws.methodLog.slice().map((e,i)=>({...e,_idx:i})).reverse().map(e=>logEntryHTML(e,ws.id)).join('');

  document.getElementById('page').innerHTML=`
    <div class="ws-header">
      <div class="ws-header-top">
        <div><div class="ws-title">${ws.title}</div><div class="ws-subtitle">${ws.subtitle}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.75rem;min-width:160px">
          <span class="status-badge status-${ws.status}">${statusLabel(ws.status)}</span>
          <div style="font-size:.8rem;color:var(--muted)">${ws.startDate} → ${ws.targetDate}</div>
        </div>
      </div>
      <p class="ws-description">${ws.description}</p>
      <div class="bar-track"><div class="bar-fill" id="prog-bar" style="width:0%"></div></div>
      <div class="bar-label">${ws.progress}% complete</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 280px;gap:1.5rem;margin-bottom:2rem;align-items:start">
      <div>
        <div class="section-label">Kanban Task Board</div>
        <div class="kanban-wrap">
          <div class="kanban-col col-todo"><div class="kanban-col-header"><span>To Do</span><span class="col-count">${todo.length}</span></div><div class="kanban-cards">${colCards(todo)}</div></div>
          <div class="kanban-col col-doing"><div class="kanban-col-header"><span>Doing</span><span class="col-count">${doing.length}</span></div><div class="kanban-cards">${colCards(doing)}</div></div>
          <div class="kanban-col col-done"><div class="kanban-col-header"><span>Done</span><span class="col-count">${done.length}</span></div><div class="kanban-cards">${colCards(done)}</div></div>
        </div>
      </div>
      <div><div class="section-label">Milestones</div><div class="info-box">${msHTML}</div></div>
    </div>
    <div class="section-block">
      <div class="section-label">Methodology Log — click any entry to open full detail</div>
      ${logHTML}
    </div>`;
  setTimeout(()=>{document.getElementById('prog-bar').style.width=ws.progress+'%'},100);
}
</script>
</body>
</html>
